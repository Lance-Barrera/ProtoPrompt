<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dot Swarm — Tuner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
    
    .content { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; height: 100vh; gap: 32px; flex-wrap: wrap; padding: 40px; }
    
    .card {
      width: 320px; height: 200px; border-radius: 16px;
      background: #0a0a0a;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.5); font-family: sans-serif; font-size: 14px;
      cursor: pointer; transition: border-color 0.3s;
      position: relative;
      z-index: 2;
    }
    .card:hover { border-color: rgba(255,255,255,0.15); }

    /* ── Control Panel ── */
    .panel {
      position: fixed; top: 16px; right: 16px; z-index: 100;
      width: 300px; max-height: calc(100vh - 32px);
      background: rgba(10,10,10,0.95);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow-y: auto;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
    }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      user-select: none;
    }
    .panel-header h3 {
      font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: rgba(255,255,255,0.5);
    }
    .panel-header .toggle { color: rgba(255,255,255,0.3); font-size: 14px; }
    .panel-body { padding: 8px 0; }
    .panel-section {
      padding: 8px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .panel-section:last-child { border-bottom: none; }
    .panel-section h4 {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: rgba(255,255,255,0.35);
      margin-bottom: 8px;
    }
    .control-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .control-row label { flex: 0 0 auto; margin-right: 8px; }
    .control-row input[type="range"] {
      flex: 1; height: 3px; -webkit-appearance: none; appearance: none;
      background: rgba(255,255,255,0.1); border-radius: 2px; outline: none;
      margin: 0 8px;
    }
    .control-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 12px; height: 12px; border-radius: 50%;
      background: rgba(255,255,255,0.6); cursor: pointer;
      border: none;
    }
    .control-row .value {
      flex: 0 0 44px; text-align: right;
      color: rgba(255,255,255,0.4); font-variant-numeric: tabular-nums;
    }
    .panel-actions {
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex; gap: 8px;
    }
    .panel-actions button {
      flex: 1; padding: 8px 0; border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px; background: transparent;
      color: rgba(255,255,255,0.6); font-family: inherit; font-size: 11px;
      cursor: pointer; transition: all 0.2s;
    }
    .panel-actions button:hover {
      background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9);
    }
    .panel-actions button.primary {
      background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8);
    }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; padding: 10px 20px; z-index: 200;
      font-family: 'SF Mono', monospace; font-size: 12px;
      color: rgba(255,255,255,0.7); backdrop-filter: blur(12px);
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <canvas id="dotCanvas"></canvas>
  <div class="content">
    <div class="card" data-swarm="true">Hover me</div>
    <div class="card" data-swarm="true">Hover me too</div>
  </div>

  <div class="panel" id="panel">
    <div class="panel-header" id="panelToggle">
      <h3>Swarm Tuner</h3>
      <span class="toggle" id="toggleIcon">—</span>
    </div>
    <div class="panel-body" id="panelBody">

      <div class="panel-section">
        <h4>Grid</h4>
        <div class="control-row">
          <label>Spacing</label>
          <input type="range" min="10" max="40" step="1" data-key="gridSpacing">
          <span class="value"></span>
        </div>
        <div class="control-row">
          <label>Dot Size</label>
          <input type="range" min="0.3" max="3" step="0.1" data-key="dotRadius">
          <span class="value"></span>
        </div>
      </div>

      <div class="panel-section">
        <h4>Cursor Attract</h4>
        <div class="control-row">
          <label>Radius</label>
          <input type="range" min="50" max="500" step="10" data-key="attractRadius">
          <span class="value"></span>
        </div>
        <div class="control-row">
          <label>Strength</label>
          <input type="range" min="0.005" max="0.1" step="0.001" data-key="attractStrength">
          <span class="value"></span>
        </div>
        <div class="control-row">
          <label>Orbit Radius</label>
          <input type="range" min="0" max="80" step="1" data-key="orbitRadius">
          <span class="value"></span>
        </div>
        <div class="control-row">
          <label>Orbit Jitter</label>
          <input type="range" min="0" max="2" step="0.05" data-key="orbitJitter">
          <span class="value"></span>
        </div>
      </div>

      <div class="panel-section">
        <h4>Card Attract</h4>
        <div class="control-row">
          <label>Radius</label>
          <input type="range" min="100" max="600" step="10" data-key="cardAttractRadius">
          <span class="value"></span>
        </div>
        <div class="control-row">
          <label>Strength</label>
          <input type="range" min="0.001" max="0.06" step="0.001" data-key="cardAttractStrength">
          <span class="value"></span>
        </div>
        <div class="control-row">
          <label>Spread</label>
          <input type="range" min="0.1" max="1.2" step="0.05" data-key="cardSpread">
          <span class="value"></span>
        </div>
      </div>

      <div class="panel-section">
        <h4>Physics</h4>
        <div class="control-row">
          <label>Friction</label>
          <input type="range" min="0.8" max="0.99" step="0.005" data-key="friction">
          <span class="value"></span>
        </div>
        <div class="control-row">
          <label>Return</label>
          <input type="range" min="0.001" max="0.04" step="0.001" data-key="returnStrength">
          <span class="value"></span>
        </div>
      </div>

      <div class="panel-section">
        <h4>Visual</h4>
        <div class="control-row">
          <label>Idle Alpha</label>
          <input type="range" min="0.01" max="0.3" step="0.01" data-key="baseDotAlpha">
          <span class="value"></span>
        </div>
        <div class="control-row">
          <label>Swarm Alpha</label>
          <input type="range" min="0.1" max="1" step="0.01" data-key="swarmDotAlpha">
          <span class="value"></span>
        </div>
        <div class="control-row">
          <label>Glow Alpha</label>
          <input type="range" min="0" max="0.4" step="0.01" data-key="glowAlpha">
          <span class="value"></span>
        </div>
      </div>

      <div class="panel-actions">
        <button id="resetBtn">Reset</button>
        <button id="exportBtn" class="primary">Copy Config</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const canvas = document.getElementById('dotCanvas');
    const ctx = canvas.getContext('2d');
    
    const DEFAULTS = {
      gridSpacing: 18,
      dotRadius: 1,
      attractRadius: 220,
      attractStrength: 0.035,
      friction: 0.92,
      returnStrength: 0.008,
      orbitRadius: 30,
      orbitJitter: 0.6,
      cardAttractRadius: 320,
      cardAttractStrength: 0.007,
      cardSpread: 0.55,
      baseDotAlpha: 0.08,
      swarmDotAlpha: 0.55,
      glowAlpha: 0.15,
    };

    const CONFIG = { ...DEFAULTS };
    
    let W, H;
    let mouse = { x: -9999, y: -9999, active: false };
    let hoveredCards = [];
    let needsReinit = false;
    
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      initDots();
    }
    
    let dots = [];
    
    function initDots() {
      dots = [];
      const cols = Math.ceil(W / CONFIG.gridSpacing);
      const rows = Math.ceil(H / CONFIG.gridSpacing);
      const offsetX = (W - (cols - 1) * CONFIG.gridSpacing) / 2;
      const offsetY = (H - (rows - 1) * CONFIG.gridSpacing) / 2;
      
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const homeX = offsetX + c * CONFIG.gridSpacing;
          const homeY = offsetY + r * CONFIG.gridSpacing;
          dots.push({
            homeX, homeY,
            x: homeX, y: homeY,
            vx: 0, vy: 0,
            orbitAngle: Math.random() * Math.PI * 2,
            orbitSpeed: 0.005 + Math.random() * 0.015,
          });
        }
      }
    }
    
    function updateHoveredCards() {
      hoveredCards = [];
      document.querySelectorAll('[data-swarm="true"]').forEach(card => {
        if (card.matches(':hover')) {
          const rect = card.getBoundingClientRect();
          hoveredCards.push({
            cx: rect.left + rect.width / 2,
            cy: rect.top + rect.height / 2,
            w: rect.width,
            h: rect.height,
          });
        }
      });
    }
    
    function updateDots() {
      if (needsReinit) { initDots(); needsReinit = false; }

      for (let i = 0; i < dots.length; i++) {
        const dot = dots[i];
        dot.orbitAngle += dot.orbitSpeed;
        let attracted = false;
        
        if (mouse.active) {
          const dx = mouse.x - dot.homeX;
          const dy = mouse.y - dot.homeY;
          const dist = Math.sqrt(dx * dx + dy * dy);
          
          if (dist < CONFIG.attractRadius) {
            const force = 1 - (dist / CONFIG.attractRadius);
            const eased = force * force * force;
            const orbitR = CONFIG.orbitRadius * (1 - eased * 0.5);
            const jitterX = Math.cos(dot.orbitAngle) * orbitR * CONFIG.orbitJitter;
            const jitterY = Math.sin(dot.orbitAngle) * orbitR * CONFIG.orbitJitter;
            
            dot.vx += (mouse.x + jitterX - dot.x) * CONFIG.attractStrength * eased;
            dot.vy += (mouse.y + jitterY - dot.y) * CONFIG.attractStrength * eased;
            attracted = true;
          }
        }
        
        for (const card of hoveredCards) {
          const dx = card.cx - dot.homeX;
          const dy = card.cy - dot.homeY;
          const dist = Math.sqrt(dx * dx + dy * dy);
          
          if (dist < CONFIG.cardAttractRadius) {
            const force = 1 - (dist / CONFIG.cardAttractRadius);
            const eased = force * force;
            const spreadX = Math.cos(dot.orbitAngle) * card.w * CONFIG.cardSpread;
            const spreadY = Math.sin(dot.orbitAngle * 1.3) * card.h * CONFIG.cardSpread;
            
            dot.vx += (card.cx + spreadX - dot.x) * CONFIG.cardAttractStrength * eased;
            dot.vy += (card.cy + spreadY - dot.y) * CONFIG.cardAttractStrength * eased;
            attracted = true;
          }
        }
        
        if (!attracted) {
          dot.vx += (dot.homeX - dot.x) * CONFIG.returnStrength;
          dot.vy += (dot.homeY - dot.y) * CONFIG.returnStrength;
        } else {
          dot.vx += (dot.homeX - dot.x) * CONFIG.returnStrength * 0.15;
          dot.vy += (dot.homeY - dot.y) * CONFIG.returnStrength * 0.15;
        }
        
        dot.vx *= CONFIG.friction;
        dot.vy *= CONFIG.friction;
        dot.x += dot.vx;
        dot.y += dot.vy;
      }
    }
    
    function render() {
      ctx.clearRect(0, 0, W, H);
      
      for (let i = 0; i < dots.length; i++) {
        const dot = dots[i];
        const dx = dot.x - dot.homeX;
        const dy = dot.y - dot.homeY;
        const displacement = Math.sqrt(dx * dx + dy * dy);
        
        const t = Math.min(displacement / 60, 1);
        const alpha = CONFIG.baseDotAlpha + (CONFIG.swarmDotAlpha - CONFIG.baseDotAlpha) * t;
        const radius = CONFIG.dotRadius + t * 0.8;
        
        ctx.beginPath();
        ctx.arc(dot.x, dot.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.fill();
        
        if (t > 0.4) {
          ctx.beginPath();
          ctx.arc(dot.x, dot.y, radius + 2, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${CONFIG.glowAlpha * (t - 0.4)})`;
          ctx.fill();
        }
      }
    }
    
    function animate() {
      updateHoveredCards();
      updateDots();
      render();
      requestAnimationFrame(animate);
    }
    
    // ── Control Panel ──

    const sliders = document.querySelectorAll('input[type="range"]');
    
    function syncSliders() {
      sliders.forEach(slider => {
        const key = slider.dataset.key;
        slider.value = CONFIG[key];
        slider.nextElementSibling.textContent = CONFIG[key];
      });
    }

    sliders.forEach(slider => {
      slider.addEventListener('input', () => {
        const key = slider.dataset.key;
        const val = parseFloat(slider.value);
        CONFIG[key] = val;
        slider.nextElementSibling.textContent = val;
        if (key === 'gridSpacing') needsReinit = true;
      });
    });

    // Toggle panel
    const panelBody = document.getElementById('panelBody');
    const toggleIcon = document.getElementById('toggleIcon');
    document.getElementById('panelToggle').addEventListener('click', () => {
      const hidden = panelBody.style.display === 'none';
      panelBody.style.display = hidden ? 'block' : 'none';
      toggleIcon.textContent = hidden ? '—' : '+';
    });

    // Reset
    document.getElementById('resetBtn').addEventListener('click', () => {
      Object.assign(CONFIG, DEFAULTS);
      syncSliders();
      needsReinit = true;
      showToast('Reset to defaults');
    });

    // Export
    document.getElementById('exportBtn').addEventListener('click', () => {
      const out = {};
      for (const key of Object.keys(DEFAULTS)) {
        out[key] = CONFIG[key];
      }
      const text = JSON.stringify(out, null, 2);
      navigator.clipboard.writeText(text).then(() => {
        showToast('Config copied to clipboard!');
      });
    });

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // ── Events ──
    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      mouse.active = true;
    });
    window.addEventListener('mouseleave', () => {
      mouse.active = false;
    });
    
    // ── Init ──
    syncSliders();
    resize();
    animate();
  </script>
</body>
</html>
